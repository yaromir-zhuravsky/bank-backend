service: bank

image: <%= ENV.fetch("KAMAL_IMAGE") %>

servers:
  web:
    - <%= ENV.fetch("KAMAL_SERVER_IP") %>

proxy:
  host: <%= ENV.fetch("KAMAL_HOST") %>
  app_port: 3000
  ssl: true

registry:
  server: <%= ENV.fetch("KAMAL_REGISTRY_SERVER", "ghcr.io") %>
  username: <%= ENV.fetch("KAMAL_REGISTRY_USERNAME") %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  cache:
    type: gha

env:
  secret:
    - BANK_DATABASE_URL
    - SECRET_KEY_BASE
    - JWT_SECRET

ssh:
  user: <%= ENV.fetch("KAMAL_SSH_USER") %>
  key_data:
    - KAMAL_SSH_PRIVATE_KEY