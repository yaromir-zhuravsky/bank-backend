name: "CD"

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Version
        id: version
        run: | 
          set -euo pipefail
          git fetch --force --tags origin
          latest_version=$(
            git tag --merged HEAD \
              | grep -E '^v[0-9]+$' \
              | sed 's/^v//' \
              | sort -n \
              | tail -n 1 || true
          )
          deploy_tag="v$(( ${latest_version:-0} + 1 ))"
          echo "deploy_tag=${deploy_tag}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - uses: crazy-max/ghaction-github-runtime@v3
      - run: bundle exec kamal deploy
        env:
          KAMAL_VERSION: ${{ steps.version.outputs.deploy_tag }}-${{ github.sha }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          KAMAL_SSH_PRIVATE_KEY: ${{ secrets.KAMAL_SSH_PRIVATE_KEY }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          BANK_DATABASE_URL: ${{ secrets.BANK_DATABASE_URL }}
      - name: Tag
        run: |
          git tag "${{ steps.version.outputs.deploy_tag }}"
          git push origin "refs/tags/${{ steps.version.outputs.deploy_tag }}"
